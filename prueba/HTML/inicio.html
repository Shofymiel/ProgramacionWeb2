<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../CSS/inicio.css">
</head>
<body>
    <form id="loginForm">
        <h2>Iniciar sesión</h2>

        <label for="usuario">Usuario o correo electrónico</label>
        <input type="text" id="usuario" placeholder="Usuario o correo" required>
        <span id="error-usuario" style="color: red; font-size: 12px;"></span>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" required>
        <span id="error-password" style="color: red; font-size: 12px;"></span>

        <div class="checkbox-container">
            <input type="checkbox" id="remember">
            <label for="remember">Recordarme</label>
        </div>

        <button type="submit" onclick="window.location.href='index.html'">Iniciar sesión</button>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            ¿No tienes cuenta? <a href="registro.html" style="color: #0a1a2b; text-decoration: none; font-weight: 500;">Regístrate</a>
        </p>
    </form>

  
<script src="./JS/validaciones-login.js"></script>
</body>
</html>
